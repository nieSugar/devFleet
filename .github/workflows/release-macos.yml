name: Release macOS

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: ''

jobs:
  prepare-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.prepare.outputs.release_id }}
      release_tag: ${{ steps.prepare.outputs.release_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Prepare release and clear existing assets
        id: prepare
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes || '' }}
          PRERELEASE: ${{ github.event.inputs.prerelease || false }}
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="v${PACKAGE_VERSION}"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            RELEASE_ID="$(gh release view "$RELEASE_TAG" --json id --jq '.id')"
          else
            NOTES="$RELEASE_NOTES"
            if [ -z "$NOTES" ]; then
              NOTES='See the assets to download and install.'
            fi

            CREATE_ARGS=(
              "$RELEASE_TAG"
              "--target" "$GITHUB_SHA"
              "--title" "devFleet $RELEASE_TAG"
              "--notes" "$NOTES"
              "--draft"
            )

            if [ "$PRERELEASE" = "true" ]; then
              CREATE_ARGS+=("--prerelease")
            fi

            gh release create "${CREATE_ARGS[@]}"
            RELEASE_ID="$(gh release view "$RELEASE_TAG" --json id --jq '.id')"
          fi

          gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
            if [ -n "$asset" ]; then
              gh release delete-asset "$RELEASE_TAG" "$asset" --yes
            fi
          done || true

          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

  publish-tauri-macos:
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Resolve pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-apple-darwin,x86_64-apple-darwin'

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync desktop app version
        run: pnpm sync:version

      - name: Show release version
        shell: bash
        run: |
          node -e "
            const pkg = require('./package.json');
            const cargo = require('fs').readFileSync('./src-tauri/Cargo.toml', 'utf8');
            const tauri = require('./src-tauri/tauri.conf.json');
            const cargoVersion = (cargo.match(/^version = \"(.*)\"$/m) || [])[1];
            console.log('package.json:', pkg.version);
            console.log('Cargo.toml:', cargoVersion);
            console.log('tauri.conf.json:', tauri.version);
          "

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ needs.prepare-release.outputs.release_tag }}
          args: ${{ matrix.args }}
