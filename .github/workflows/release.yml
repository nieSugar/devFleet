name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (leave empty to use Cargo.toml version)'
        required: false
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: ''

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Override version (if provided)
        if: github.event.inputs.version != ''
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # Update tauri.conf.json
          cd src-tauri
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf8'));
            conf.version = '${VERSION}';
            fs.writeFileSync('tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          # Update Cargo.toml
          node -e "
            const fs = require('fs');
            let cargo = fs.readFileSync('Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version = \".*\"/m, 'version = \"${VERSION}\"');
            fs.writeFileSync('Cargo.toml', cargo);
          "

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__
          releaseName: 'devFleet v__VERSION__'
          releaseBody: ${{ github.event.inputs.release_notes || 'See the assets to download and install.' }}
          releaseDraft: true
          prerelease: ${{ github.event.inputs.prerelease }}
          args: ${{ matrix.args }}

      - name: Create portable package (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $version = $conf.version
          $exe = "src-tauri/target/release/devFleet.exe"
          $portableDir = "devFleet_${version}_windows_x64_portable"
          $zip = "${portableDir}.zip"

          if (Test-Path $portableDir) {
            Remove-Item $portableDir -Recurse -Force
          }

          if (Test-Path $zip) {
            Remove-Item $zip -Force
          }

          New-Item -ItemType Directory -Path $portableDir | Out-Null
          Copy-Item $exe -Destination (Join-Path $portableDir "devFleet.exe")

          if (Test-Path "LICENSE") {
            Copy-Item "LICENSE" -Destination (Join-Path $portableDir "LICENSE")
          }

          @"
          devFleet Windows Portable

          这是免安装版本，解压后直接运行 devFleet.exe 即可。

          使用说明：
          1. 解压整个 zip 包到任意目录。
          2. 双击 devFleet.exe 启动。
          3. 如首次运行缺少 WebView2 Runtime，请先安装系统组件后再启动。

          说明：
          - 此版本不会写入安装目录。
          - 如需开始菜单、卸载入口或自动安装流程，请使用 NSIS 安装版。
          "@ | Set-Content -Path (Join-Path $portableDir "README.txt") -Encoding UTF8

          # 压缩目录而不是单个 exe，这样用户解压后就是标准的“免安装绿色版”结构。
          Compress-Archive -Path $portableDir -DestinationPath $zip
          echo "PORTABLE_ZIP=$zip" >> $env:GITHUB_ENV
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Upload portable zip (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "v${APP_VERSION}" "$PORTABLE_ZIP" --clobber
