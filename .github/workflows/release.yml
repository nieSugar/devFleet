name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: ''

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.prepare.outputs.release_id }}
      release_tag: ${{ steps.prepare.outputs.release_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Prepare release and clear existing assets
        id: prepare
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_notes || '' }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease || false }}
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="v${PACKAGE_VERSION}"

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
              echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)." >&2
              exit 1
            fi
            RELEASE_TAG="$GITHUB_REF_NAME"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            RELEASE_ID="$(gh release view "$RELEASE_TAG" --json databaseId --jq '.databaseId')"
          else
            NOTES="$RELEASE_NOTES"
            if [ -z "$NOTES" ]; then
              NOTES='See the assets to download and install.'
            fi

            CREATE_ARGS=(
              "$RELEASE_TAG"
              "--target" "$GITHUB_SHA"
              "--title" "devFleet $RELEASE_TAG"
              "--notes" "$NOTES"
              "--draft"
            )

            if [ "$PRERELEASE" = "true" ]; then
              CREATE_ARGS+=("--prerelease")
            fi

            gh release create "${CREATE_ARGS[@]}"
            RELEASE_ID="$(gh release view "$RELEASE_TAG" --json databaseId --jq '.databaseId')"
          fi

          gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
            if [ -n "$asset" ]; then
              gh release delete-asset "$RELEASE_TAG" "$asset" --yes
            fi
          done || true

          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

  publish-tauri:
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Resolve pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync desktop app version
        run: pnpm sync:version

      - name: Show release version
        shell: bash
        run: |
          node -e "
            const pkg = require('./package.json');
            const cargo = require('fs').readFileSync('./src-tauri/Cargo.toml', 'utf8');
            const tauri = require('./src-tauri/tauri.conf.json');
            const cargoVersion = (cargo.match(/^version = \"(.*)\"$/m) || [])[1];
            console.log('package.json:', pkg.version);
            console.log('Cargo.toml:', cargoVersion);
            console.log('tauri.conf.json:', tauri.version);
          "

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ needs.prepare-release.outputs.release_tag }}
          args: ${{ matrix.args }}

      - name: Create portable package (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $version = $conf.version
          $exe = "src-tauri/target/release/devFleet.exe"
          $portableDir = "devFleet_${version}_windows_x64_portable"
          $zip = "${portableDir}.zip"

          if (Test-Path $portableDir) {
            Remove-Item $portableDir -Recurse -Force
          }

          if (Test-Path $zip) {
            Remove-Item $zip -Force
          }

          New-Item -ItemType Directory -Path $portableDir | Out-Null
          Copy-Item $exe -Destination (Join-Path $portableDir "devFleet.exe")

          if (Test-Path "LICENSE") {
            Copy-Item "LICENSE" -Destination (Join-Path $portableDir "LICENSE")
          }

          @"
          devFleet Windows Portable

          这是免安装版本，解压后直接运行 devFleet.exe 即可。

          使用说明：
          1. 解压整个 zip 包到任意目录。
          2. 双击 devFleet.exe 启动。
          3. 如首次运行缺少 WebView2 Runtime，请先安装系统组件后再启动。

          说明：
          - 此版本不会写入安装目录。
          - 如需开始菜单、卸载入口或自动安装流程，请使用 NSIS 安装版。
          "@ | Set-Content -Path (Join-Path $portableDir "README.txt") -Encoding UTF8

          # 压缩目录而不是单个 exe，这样用户解压后就是标准的“免安装绿色版”结构。
          Compress-Archive -Path $portableDir -DestinationPath $zip
          echo "PORTABLE_ZIP=$zip" >> $env:GITHUB_ENV
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Upload portable zip (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "v${APP_VERSION}" "$PORTABLE_ZIP" --clobber
